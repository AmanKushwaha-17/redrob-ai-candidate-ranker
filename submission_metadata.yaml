ai_usage_summary: |
  Used Claude and Gemini to help design the BM25 + keyword smart gate, implement the evaluation pipeline, and optimize the sentence-transformer inference loop to fit within the 5-minute constraint.

methodology_summary: |
  Two-stage ranking pipeline.
  Stage 1 (Smart Gate): BM25 + keyword domain scoring reduces 9,603 valid candidates to the top 2,000 to save compute.
  Stage 2 (Embedding): Uses local BAAI/bge-small-en-v1.5 to encode the top 2,000 candidates.
  Final score is a weighted combination of: semantic similarity (40%), BM25 (10%), keyword domain (33%), assessment (12%), and education (5%), modified by a behavioral multiplier (notice period, GitHub activity).
  Runtime is ~226 seconds on a 12-core CPU.

